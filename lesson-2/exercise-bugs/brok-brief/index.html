<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Генератор заголовков</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
  h1 { color: #333; }
  textarea { width: 100%; height: 100px; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; resize: vertical; }
  button { margin-top: 10px; padding: 12px 24px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  button:hover { background: #4f46e5; }
  #result { margin-top: 20px; padding: 16px; background: white; border-radius: 8px; border: 1px solid #ddd; display: none; }
  .headline { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 15px; }
</style>
</head>
<body>
  <h1>✍️ Генератор заголовков</h1>
  <p>Опиши тему материала — получи варианты заголовков</p>
  <textarea id="topic" placeholder="Например: статья про то как ИИ меняет профессию дизайнера"></textarea>
  <br>
  <button onclick="generate()">Сгенерировать заголовки</button>
  <div id="result">
    <strong>Варианты заголовков:</strong>
    <div id="headlines"></div>
  </div>

  <script>
    function generate() {
      const topic = document.getElementById('topic').value.trim();
      if (!topic) {
        alert('Введи тему!');
        return;
      }

      const templates = [
        `Как ${topic} меняет всё`,
        `${topic}: что нужно знать прямо сейчас`,
        `Почему ${topic} важнее чем ты думаешь`,
        `${topic} — полное руководство`,
        `5 вещей которые никто не говорит про ${topic}`,
      ];

      // ОШИБКА: querySelector ищет элемент по классу, но у div нет класса — нужен #headlines
      const container = document.querySelector('headlines');
      container.innerHTML = '';

      templates.forEach(h => {
        const div = document.createElement('div');
        div.className = 'headline';
        div.textContent = h;
        container.appendChild(div);
      });

      document.getElementById('result').style.display = 'block';
    }
  </script>
</body>
</html>
